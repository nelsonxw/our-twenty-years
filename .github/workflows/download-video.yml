name: Download 2006 hero video from Google Drive

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  GOOGLE_DRIVE_FILE_ID: 1GqVDKlGXPKvrpGynKsc7kpUFdBXyqGbR
  VIDEO_PATH: public/videos/2006-hero.mp4

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdown
        run: pip install gdown

      - name: Install Git LFS
        run: git lfs install

      - name: Download video from Google Drive
        run: |
          mkdir -p public/videos
          gdown "${GOOGLE_DRIVE_FILE_ID}" -O "${VIDEO_PATH}"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push video
        run: |
          git add "${VIDEO_PATH}"
          if git diff --cached --exit-code; then
            echo "No changes to commit."
          else
            git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git commit -m "Add 2006 hero video from Google Drive"
            git push origin ${{ github.ref_name }}
          fi
